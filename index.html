<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Glance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#FFF8F0;--crimson:#9E2B25;--plum:#51355A;
  --ink:#1a1208;--ink2:#5c4a2a;--ink3:#9e8c72;
  --rule:rgba(26,18,8,0.10);--rule2:rgba(26,18,8,0.18);
  --card:#ffffff;--bg2:#fdf4eb;--r:12px;--rsm:8px;
}
body{font-family:"Georgia",serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:16px;line-height:1.5;}
.app{max-width:760px;margin:0 auto;padding:0 20px 80px;}
.masthead{padding:32px 0 20px;border-bottom:2px solid var(--ink);margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.site-name{font-size:28px;font-weight:700;letter-spacing:-0.5px;color:var(--ink);line-height:1;}
.site-name span{color:var(--crimson);}
.site-tagline{font-size:12px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.masthead-right{text-align:right;}
#upd{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.04em;}
.rbtn{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:5px 14px;background:transparent;border:1px solid var(--rule2);border-radius:99px;color:var(--ink2);cursor:pointer;margin-top:5px;display:inline-block;letter-spacing:0.04em;transition:all .15s;}
.rbtn:hover{background:var(--ink);color:var(--cream);}
.rbtn:disabled{opacity:.4;cursor:default;}
.live-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--crimson);margin-right:6px;animation:pulse 1.4s infinite;vertical-align:middle;position:relative;top:-1px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.nav-strip{display:flex;gap:0;border-bottom:1px solid var(--rule);margin-bottom:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.ntab{font-size:13px;font-weight:500;padding:10px 20px;cursor:pointer;color:var(--ink3);border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;letter-spacing:0.02em;transition:color .15s;}
.ntab:hover{color:var(--ink);}
.ntab.on{color:var(--ink);border-bottom-color:var(--crimson);}
.stabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.stab{font-size:12px;font-weight:500;padding:4px 16px;border:1px solid var(--rule2);border-radius:99px;cursor:pointer;color:var(--ink3);background:transparent;transition:all .15s;letter-spacing:0.02em;}
.stab:hover{color:var(--ink);border-color:var(--ink3);}
.stab.on{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.banner{font-size:13px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:12px 16px;border-radius:var(--rsm);margin-bottom:16px;display:none;}
.banner.loading{background:#fde8e7;color:var(--crimson);display:block;}
.banner.error{background:#fee2e2;color:#991b1b;display:block;}
.banner.empty{background:var(--bg2);color:var(--ink2);display:block;}
.card{background:var(--card);border:1px solid var(--rule);border-radius:var(--r);padding:16px 20px;cursor:pointer;margin-bottom:12px;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.card:hover{border-color:var(--rule2);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card.open{border-color:var(--crimson);box-shadow:0 2px 8px rgba(158,43,37,.10);}
.card-head{display:flex;align-items:center;gap:10px;}
.game-time{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.04em;min-width:70px;flex-shrink:0;}
.live-tag{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--crimson);font-weight:600;letter-spacing:0.04em;min-width:80px;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--crimson);animation:pulse 1.4s infinite;flex-shrink:0;}
.final-tag{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.04em;min-width:60px;flex-shrink:0;}
.matchup{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.team-col{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.team-abbr{font-size:14px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0.02em;color:var(--ink);}
.team-score{font-size:24px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.1;}
.team-score.hi{color:var(--ink);}
.team-score.lo{color:var(--ink3);}
.at-sep{font-size:12px;color:var(--ink3);padding:0 2px;padding-top:8px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.broadcast{font-size:10px;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin-left:4px;}
.tag{font-size:10px;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:2px 8px;border-radius:99px;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;margin-left:4px;}
.tag-crimson{background:#fde8e7;color:var(--crimson);}
.tag-plum{background:#ede8f0;color:var(--plum);}
.score-block{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:80px;flex-shrink:0;}
.score-label{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.04em;text-transform:uppercase;}
.score-num{font-size:32px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1;letter-spacing:-1px;}
.score-num.sg{color:var(--crimson);}
.score-num.sm{color:var(--plum);}
.score-num.sr{color:var(--ink3);}
.score-badge{font-size:10px;font-weight:600;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:2px 8px;border-radius:99px;letter-spacing:0.04em;text-transform:uppercase;}
.bb-crimson{background:#fde8e7;color:var(--crimson);}
.bb-plum{background:#ede8f0;color:var(--plum);}
.bb-gray{background:var(--bg2);color:var(--ink3);}
.xbody{margin-top:16px;padding-top:16px;border-top:1px solid var(--rule);}
.meta-note{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);line-height:1.6;margin-bottom:14px;padding:8px 12px;background:var(--bg2);border-radius:var(--rsm);}
.expand-label{font-size:10px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);letter-spacing:0.10em;text-transform:uppercase;margin:14px 0 8px;}
.sstrip{display:flex;gap:8px;margin-bottom:4px;}
.scard{flex:1;background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;}
.sname{font-size:13px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:block;}
.sname small{font-weight:400;font-size:11px;color:var(--ink3);}
.srec{font-size:11px;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:block;margin-top:2px;}
.sseed{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;display:inline-block;margin-top:5px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0.02em;}
.seed-g{background:#fde8e7;color:var(--crimson);}
.seed-b{background:#ede8f0;color:var(--plum);}
.seed-y{background:#fef3c7;color:#92400e;}
.seed-r{background:#f3f4f6;color:#6b7280;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
.factor{background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;}
.factor-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.fname{font-size:11px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink2);font-weight:500;}
.fwt{font-size:10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink3);}
.fbar-bg{height:3px;background:var(--rule);border-radius:99px;margin-bottom:6px;overflow:hidden;}
.fbar{height:3px;border-radius:99px;}
.fval{font-size:14px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);}
.fval small{font-size:10px;color:var(--ink3);font-weight:400;}
.qtable{display:flex;margin-bottom:4px;border:1px solid var(--rule);border-radius:var(--rsm);overflow:hidden;}
.qcol{flex:1;text-align:center;border-right:1px solid var(--rule);}
.qcol:last-child{border-right:none;}
.qhdr{font-size:10px;color:var(--ink3);padding:4px 0;background:var(--bg2);border-bottom:1px solid var(--rule);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0.04em;}
.qaway{font-size:12px;font-weight:500;padding:4px 0;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.qhome{font-size:12px;font-weight:500;padding:4px 0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;border-top:1px solid var(--rule);}
.bold{font-weight:700;}
.box-row{display:flex;gap:14px;margin-bottom:4px;}
.box-col{flex:1;min-width:0;}
.box-lbl{font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:5px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0.04em;text-transform:uppercase;}
.box-hdr{display:flex;align-items:center;padding:0 0 4px;border-bottom:1px solid var(--rule);margin-bottom:2px;}
.prow{display:flex;align-items:center;padding:4px 0;border-bottom:1px solid var(--rule);}
.prow:last-child{border-bottom:none;}
.pnm{font-size:12px;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.pst{font-size:11px;color:var(--ink3);text-align:right;width:28px;flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.pst.bold{font-weight:700;color:var(--ink);}
.loading-txt{font-size:12px;color:var(--ink3);padding:8px 0;font-style:italic;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.chart-sec{margin-bottom:4px;}
.chart-leg{display:flex;gap:14px;margin-bottom:8px;}
.chart-leg span{font-size:11px;color:var(--ink2);display:flex;align-items:center;gap:5px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.cline{width:14px;height:2px;display:inline-block;border-radius:1px;}
.chart-wrap{position:relative;width:100%;height:130px;}
.wp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.wp-tm{font-size:12px;font-weight:700;width:36px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.wp-bg{flex:1;height:6px;background:var(--rule);border-radius:99px;overflow:hidden;}
.wp-fill{height:6px;border-radius:99px;}
.wp-pct{font-size:12px;font-weight:600;width:36px;text-align:right;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.verdict{padding:12px 16px;border-radius:var(--rsm);font-size:14px;font-weight:700;margin-top:14px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0.01em;}
.star-box{background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;margin-bottom:4px;}
.star-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--rule);}
.star-row:last-child{border-bottom:none;}
.star-tm{font-size:11px;color:var(--ink3);width:32px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:600;}
.star-nm{font-size:13px;color:var(--ink);flex:1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.star-av{font-size:11px;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.lgd{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.lgdi{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2);}
.lgdd{width:8px;height:8px;border-radius:50%;}
.t-rank{font-size:14px;font-weight:700;color:var(--ink3);width:22px;flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.t-info{flex:1;min-width:0;}
.t-title{font-size:15px;font-weight:700;display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.t-sub{font-size:11px;color:var(--ink3);margin-top:2px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.tbars{margin-bottom:14px;}
.tbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.tbn{font-size:12px;color:var(--ink2);width:170px;flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.tbbg{flex:1;height:5px;background:var(--rule);border-radius:99px;overflow:hidden;}
.tbf{height:5px;border-radius:99px;}
.tbv{font-size:11px;font-weight:600;width:150px;text-align:right;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.m3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mcard{background:var(--bg2);border-radius:var(--rsm);padding:10px 12px;}
.ml{font-size:11px;color:var(--ink3);margin-bottom:3px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.mv{font-size:16px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.ms{font-size:11px;margin-top:2px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.hyrs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.hyr{display:flex;flex-direction:column;align-items:center;gap:3px;}
.hybg{width:24px;height:60px;background:var(--bg2);border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;border:1px solid var(--rule);}
.hybf{width:100%;}
.hyrl{font-size:9px;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.hyrr{font-size:9px;font-weight:600;color:var(--ink2);max-width:44px;text-align:center;line-height:1.2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.pnote{font-size:13px;color:var(--ink2);padding:10px 14px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:12px;line-height:1.6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;border-left:3px solid var(--rule2);}
.inj-list{display:flex;flex-direction:column;gap:7px;}
.inj-row{display:flex;align-items:center;gap:10px;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.inj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.doto{background:#dc2626;}.dotq{background:#f59e0b;}.dotk{background:#16a34a;}
.inj-n{font-weight:600;}.inj-z{color:var(--ink3);}
.section-hed{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--rule);}
.section-hed:first-child{margin-top:0;}
.champ-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
@media(max-width:480px){.champ-grid{grid-template-columns:1fr;}}
.champ-card{background:var(--card);border:1px solid var(--rule);border-radius:var(--rsm);padding:10px 14px;display:flex;flex-direction:column;gap:4px;}
.champ-team{font-size:13px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.champ-odds{font-size:18px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--crimson);}
.champ-bar-bg{height:3px;background:var(--rule);border-radius:99px;overflow:hidden;}
.champ-bar{height:3px;border-radius:99px;}
.mvp-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--rule);}
.mvp-row:last-child{border-bottom:none;margin-bottom:4px;}
.mvp-left{flex:1;}
.mvp-name{font-size:14px;font-weight:700;display:block;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.mvp-team{font-size:11px;color:var(--ink3);display:block;margin-top:1px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.mvp-right{text-align:right;flex-shrink:0;max-width:220px;}
.mvp-odds{font-size:16px;font-weight:700;color:var(--crimson);display:block;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.mvp-note{font-size:11px;color:var(--ink3);display:block;margin-top:2px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.4;}
.series-card{background:var(--card);border:1px solid var(--rule);border-radius:var(--r);padding:16px 20px;cursor:pointer;margin-bottom:12px;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.series-card:hover{border-color:var(--rule2);box-shadow:0 2px 8px rgba(0,0,0,.07);}
.series-card.open{border-color:var(--crimson);}
.series-teams{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.series-team{display:flex;align-items:center;gap:10px;}
.series-seed{font-size:12px;color:var(--ink3);width:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:600;}
.series-name{flex:1;font-size:14px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.series-team.dog .series-name{font-weight:500;color:var(--ink2);}
.series-prob{font-size:14px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.series-odds{font-size:11px;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg2);padding:2px 7px;border-radius:99px;margin-left:4px;}
.series-bar-bg{height:4px;background:var(--rule);border-radius:99px;overflow:hidden;margin-top:4px;}
.series-bar-fill{height:4px;border-radius:99px;}
.series-body{margin-top:16px;padding-top:16px;border-top:1px solid var(--rule);}
.series-keys{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.series-key{font-size:13px;color:var(--ink2);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:flex-start;gap:10px;line-height:1.5;}
.key-dot{width:5px;height:5px;border-radius:50%;background:var(--crimson);flex-shrink:0;margin-top:7px;}
.series-edge{font-size:14px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);padding:10px 14px;background:var(--bg2);border-radius:var(--rsm);border-left:3px solid var(--crimson);margin-bottom:4px;line-height:1.5;}
.series-proj{font-size:16px;font-weight:700;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--crimson);padding:8px 0 0;}
</style>
</head>
<body>
<div class="app">
  <div class="masthead">
    <div>
      <div class="site-name">NBA<span>&nbsp;Glance</span></div>
      <div class="site-tagline"><span class="live-pulse"></span>Live scores &middot; Watchability &middot; Playoff intelligence</div>
    </div>
    <div class="masthead-right">
      <div id="upd">Loading...</div>
      <button class="rbtn" id="rbtn" onclick="fetchAndRender()">Refresh</button>
    </div>
  </div>
  <div class="nav-strip">
    <button class="ntab on" onclick="showPage('games',this)">Games</button>
    <button class="ntab" onclick="showPage('teams',this)">Teams</button>
    <button class="ntab" onclick="showPage('bracket',this)">Playoff Outlook</button>
  </div>
  <div id="pg-games">
    <div class="stabs">
      <button class="stab on" id="tlive" onclick="showGameTab('live',this)">Live</button>
      <button class="stab" id="tupcoming" onclick="showGameTab('upcoming',this)">Upcoming</button>
      <button class="stab" id="tfinal" onclick="showGameTab('final',this)">Final</button>
    </div>
    <div id="banner" class="banner loading">Fetching live scores...</div>
    <div id="gc"></div>
  </div>
  <div id="pg-teams" style="display:none">
    <div class="stabs">
      <button class="stab on" onclick="showConfTab('W',this)">Western Conference</button>
      <button class="stab" onclick="showConfTab('E',this)">Eastern Conference</button>

function scoreColor(v){return v>=70?”#9E2B25”:v>=50?”#51355A”:v>=35?”#b45309”:”#6b7280”;}
function scoreClass(v){return v>=70?“sg”:v>=45?“sm”:“sr”;}
function scoreBadge(v){return v>=70?“bb-crimson”:v>=45?“bb-plum”:“bb-gray”;}
function pgBadgeTxt(v){return v>=70?“Must watch”:v>=55?“Worth it”:v>=40?“Average”:“Skip”;}
function wsBadgeTxt(v){return v>=70?“Hot”:v>=45?“Ok”:“Skip”;}
function verdictStyle(s){
if(s>=65){return “background:#fde8e7;color:#9E2B25;border-left:3px solid #9E2B25”;}
if(s>=50){return “background:#f0eaf2;color:#51355A;border-left:3px solid #51355A”;}
return “background:#f3f4f6;color:#6b7280;border-left:3px solid #d1d5db”;
}
function verdictTxt(s){
if(s>=80){return “Must watch right now”;}
if(s>=65){return “Worth turning on”;}
if(s>=50){return “Decent if interested”;}
if(s>=35){return “Skip unless your team”;}
return “Hard pass”;
}
function pgVerdictTxt(s){
if(s>=75){return “Circle this one tonight”;}
if(s>=60){return “Should be a good one”;}
if(s>=45){return “Watchable if nothing else is on”;}
return “Low priority tonight”;
}
function seedLabel(rank){
if(rank<=2){return {l:”#”+rank+” Locked”,c:“seed-g”};}
if(rank<=6){return {l:”#”+rank+” seed”,c:“seed-b”};}
if(rank<=10){return {l:”#”+rank+” Play-in”,c:“seed-y”};}
return {l:“Eliminated”,c:“seed-r”};
}
function fmtTime(iso){
if(!iso){return “”;}
try{return new Date(iso).toLocaleTimeString([],{hour:“numeric”,minute:“2-digit”,timeZoneName:“short”});}
catch(e){return “”;}
}
function elapsedPct(q,cl){
var m=(cl||””).match(/(\d+):(\d+)/);
var sl=m?parseInt(m[1])*60+parseInt(m[2]):720;
return Math.min(((q-1)*12+(720-sl)/60)/48,1);
}
function calcStakes(ha,aa){
var h=STANDINGS[A2N[ha]];
var a=STANDINGS[A2N[aa]];
if(!h||!a){return {score:20,label:“Low stakes”,reason:“No data”};}
var same=h.conf===a.conf;
var hr=h.confRank,ar=a.confRank;
var score=20,reasons=[];
if(same&&hr<=10&&ar<=10){
var d=Math.abs(hr-ar);
if(d<=2){score+=50;reasons.push(“Direct seed battle”);}
else if(d<=4){score+=35;reasons.push(“Seed positioning”);}
else{score+=20;reasons.push(“Conference game”);}
}else if(hr<=10&&ar<=10){score+=25;reasons.push(“Both contenders”);}
if([hr,ar].some(function(r){return r===6||r===7;})){score+=20;reasons.push(“Playoff cut line”);}
if([hr,ar].some(function(r){return r>=8&&r<=10;})){score+=15;reasons.push(“Play-in bubble”);}
score=Math.min(100,Math.round(score*1.3));
return{score:score,label:score>=70?“High stakes”:score>=45?“Playoff implications”:“Low stakes”,reason:reasons.join(” - “)||“Low stakes”};
}
function calcPregame(ha,aa,wp){
var hs=STARS[ha]||{players:[],ppg:[],rating:65};
var as2=STARS[aa]||{players:[],ppg:[],rating:65};
var hst=STANDINGS[A2N[ha]];
var ast=STANDINGS[A2N[aa]];
var starScore=Math.round((hs.rating+as2.rating)/2);
var sk=calcStakes(ha,aa);
var hN=hst?hst.netRtg:0;
var aN=ast?ast.netRtg:0;
var muScore=Math.min(100,Math.max(0,50+((hN+aN)/2)*4));
var tScore=50;
if(wp){var hP=wp[ha]||50;tScore=Math.round(Math.max(10,100-Math.abs(hP-50)*2));}
var tot=Math.round(starScore*0.30+sk.score*0.28+muScore*0.22+tScore*0.20);
return{tot:Math.min(99,Math.max(1,tot)),sk:sk,starScore:starScore,muScore:Math.round(muScore),tScore:tScore,hs:hs,as2:as2};
}
function calcWatch(g){
if(g.status===“scheduled”){return null;}
var gp=elapsedPct(g.quarter||1,g.clock);
var hs=g.home.score||0;
var as2=g.away.score||0;
var tp=hs+as2;
var af=((g.home.fgPct||0.45)+(g.away.fgPct||0.45))/2;
var em=af>0.55?1.2:af>0.48?1.05:af>0.40?0.90:0.75;
var pr=gp<0.05?50:Math.min(100,Math.max(0,50+(tp-220*gp)*3));
var pace=Math.min(100,Math.round(pr*em));
var all=(g.leaders?(g.leaders.home||[]).concat(g.leaders.away||[]):[]);
var ss=0,sc=0;
all.forEach(function(p){
var avg=AVGS[p.name]||12;
var proj=avg*gp;
var ab=Math.min(100,p.pts/(avg*0.5+0.01)*50);
var pf=gp<0.05?50:Math.min(100,50+(p.pts-proj)*5);
ss+=ab*0.4+pf*0.6;sc++;
});
var star=sc?Math.round(ss/sc):40;
var sk=calcStakes(g.home.abbr,g.away.abbr);
var mg=Math.abs(hs-as2);
var gw=Math.min(1,gp*3);
var cl=Math.round(Math.max(0,100-mg*4)*gw+50*(1-gw));
var mm=(g.clock||””).match(/(\d+):(\d+)/);
var sl=mm?parseInt(mm[1])*60+parseInt(mm[2]):720;
var cu=(g.quarter||1)>=4?Math.min(100,40+(720-sl)/7.2):(g.quarter||1)===3&&sl<180?30:8;
var tot=Math.round(pace*0.26+star*0.24+sk.score*0.22+cl*0.18+Math.round(cu)*0.10);
return{
tot:Math.min(99,Math.max(1,tot)),sk:sk,
factors:{
pace:{v:pace,w:“26%”,l:“Pace and scoring”},
star:{v:star,w:“24%”,l:“Star performances”},
stakes:{v:sk.score,w:“22%”,l:“Playoff stakes”},
closeness:{v:cl,w:“18%”,l:“Game closeness”},
clutch:{v:Math.round(cu),w:“10%”,l:“Clutch factor”}
}
};
}
function standStrip(ha,aa,hn,an){
return [{abbr:aa,name:an},{abbr:ha,name:hn}].map(function(t){
var s=STANDINGS[t.name]||STANDINGS[A2N[t.abbr]];
if(!s){return ‘<div class="scard"><span class="sname">’+t.abbr+’</span></div>’;}
var si=seedLabel(s.confRank);
return ‘<div class="scard"><span class="sname">’+t.abbr+’ <small>’+(s.conf===“E”?“East”:“West”)+’</small></span><span class="srec">’+s.wins+’-’+s.losses+’</span><span class="sseed '+si.c+'">’+si.l+’</span></div>’;
}).join(””);
}
function factorBars(factors){
return Object.keys(factors).map(function(k){
var f=factors[k];
return ‘<div class="factor"><div class="factor-top"><span class="fname">’+f.l+’</span><span class="fwt">’+f.w+’</span></div><div class="fbar-bg"><div class="fbar" style="width:'+f.v+'%;background:'+scoreColor(f.v)+'"></div></div><span class="fval">’+f.v+’<small>/100</small></span></div>’;
}).join(””);
}
async function doFetch(){
if(isFetching){return;}
isFetching=true;
document.getElementById(“rbtn”).disabled=true;
try{
var res=await fetch(”/api/scores”);
if(!res.ok){throw new Error(“HTTP “+res.status);}
var data=await res.json();
if(!data.success){throw new Error(data.error||“API error”);}
liveGames=data.games||[];
lastFetched=new Date();
var lv=liveGames.filter(function(g){return g.status===“inprogress”;}).length;
var up=liveGames.filter(function(g){return g.status===“scheduled”;}).length;
var fn=liveGames.filter(function(g){return g.status===“final”;}).length;
document.getElementById(“tlive”).textContent=“Live (”+lv+”)”;
document.getElementById(“tupcoming”).textContent=“Upcoming (”+up+”)”;
document.getElementById(“tfinal”).textContent=“Final (”+fn+”)”;
hideBanner();
updateTs();
}catch(err){
showBanner(“error”,“Could not load scores: “+err.message);
}finally{
isFetching=false;
document.getElementById(“rbtn”).disabled=false;
}
}
async function fetchAndRender(){
await doFetch();
if(pageTab===“games”){renderGames();}
}
async function fetchBox(gameId){
try{
var res=await fetch(”/api/boxscore?gameId=”+gameId);
if(!res.ok){return;}
var data=await res.json();
if(!data.success){return;}
var g=liveGames.find(function(x){return x.id===gameId;});
if(!g){return;}
g.leaders={home:data.home.players.slice(0,6),away:data.away.players.slice(0,6)};
renderGames();
setTimeout(function(){drawChart(“ch-”+gameId,g);},80);
}catch(err){console.error(“boxscore:”,err);}
}
function updateTs(){
if(!lastFetched){return;}
var s=Math.round((Date.now()-lastFetched)/1000);
document.getElementById(“upd”).textContent=s<5?“Just updated”:“Updated “+s+“s ago”;
}
function showBanner(type,msg){
var e=document.getElementById(“banner”);
e.className=“banner “+type;
e.textContent=msg;
e.style.display=“block”;
}
function hideBanner(){document.getElementById(“banner”).style.display=“none”;}
function renderGames(){
var list;
if(gameTab===“live”){list=liveGames.filter(function(g){return g.status===“inprogress”;});}
else if(gameTab===“upcoming”){list=liveGames.filter(function(g){return g.status===“scheduled”;});}
else{list=liveGames.filter(function(g){return g.status===“final”;});}
if(!list||!list.length){
if(!lastFetched){showBanner(“loading”,“Fetching live scores…”);}
else{showBanner(“empty”,gameTab===“live”?“No games in progress right now.”:“No “+gameTab+” games right now.”);}
document.getElementById(“gc”).innerHTML=””;
return;
}
hideBanner();
if(gameTab===“live”){
list=list.slice().sort(function(a,b){
var wa=calcWatch(a),wb=calcWatch(b);
return (wb?wb.tot:0)-(wa?wa.tot:0);
});
}
if(gameTab===“upcoming”){
list=list.slice().sort(function(a,b){
return calcPregame(b.home.abbr,b.away.abbr,null).tot-calcPregame(a.home.abbr,a.away.abbr,null).tot;
});
}
document.getElementById(“gc”).innerHTML=list.map(renderCard).join(””);
}

function toggleGame(id){
expandedGame=(expandedGame===id)?null:id;
renderGames();
if(expandedGame){
var g=liveGames.find(function(x){return x.id===id;});
if(g&&(g.status===“inprogress”||g.status===“final”)){
setTimeout(function(){drawChart(“ch-”+id,g);},80);
fetchBox(id);
}
}
}
function drawChart(cid,g){
var ex=charts[cid];
if(ex){ex.destroy();delete charts[cid];}
var cv=document.getElementById(cid);
if(!cv){return;}
var gp=elapsedPct(g.quarter||1,g.clock);
var mg=(g.home.score||0)-(g.away.score||0);
var ch=Math.min(95,Math.max(5,50+mg*3*(gp>0.1?1:0.3)));
var hd=[50,Math.round(50+mg*1.5*(gp/2)),Math.round(ch)];
var ad=hd.map(function(v){return 100-v;});
charts[cid]=new Chart(cv,{
type:“line”,
data:{
labels:[“Start”,“Mid”,“Now”],
datasets:[
{label:g.home.abbr,data:hd,borderColor:”#9E2B25”,borderWidth:2,pointRadius:3,pointBackgroundColor:”#9E2B25”,tension:0.4,fill:false},
{label:g.away.abbr,data:ad,borderColor:”#51355A”,borderWidth:2,pointRadius:3,pointBackgroundColor:”#51355A”,tension:0.4,fill:false}
]
},
options:{
responsive:true,maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{grid:{display:false},ticks:{font:{size:10},color:”#9ca3af”}},
y:{min:0,max:100,grid:{color:“rgba(0,0,0,0.05)”},ticks:{font:{size:10},color:”#9ca3af”,callback:function(v){return v+”%”;},stepSize:25}}
}
}
});
}

];
var bH=bars.map(function(b){
return ‘<div class="tbar"><span class="tbn">’+b.n+’</span><div class="tbbg"><div class="tbf" style="width:'+b.v+'%;background:'+b.c+'"></div></div><span class="tbv" style="color:'+b.c+'">’+b.tx+’</span></div>’;
}).join(””);
var hiH=t.pr.map(function(r){
var bg=r.h>=90?”#9E2B25”:r.h>=60?”#51355A”:r.h>=25?”#b45309”:”#e5e7eb”;
return ‘<div class="hyr"><div class="hybg"><div class="hybf" style="height:'+r.h+'%;background:'+bg+'"></div></div><div class="hyrl">’+r.yr+’</div><div class="hyrr">’+r.l+’</div></div>’;
}).join(””);
var ijH=t.inj.map(function(i){
return ‘<div class="inj-row"><div class="inj-dot '+i.dc+'"></div><span class="inj-n">’+i.n+’</span><span class="inj-z">’+i.s+(i.note?” - “+i.note:””)+’</span></div>’;
}).join(””);
xH=’<div class="xbody">’+
‘<div class="expand-label">Performance vs expectation</div><div class="tbars">’+bH+’</div>’+
‘<div class="m3">’+
‘<div class="mcard"><div class="ml">Off rating</div><div class="mv">’+t.offR+’</div><div class=“ms” style=“color:’+(t.offR>115?”#9E2B25”:”#b45309”)+’”>Lg avg 115.2</div></div>’+
‘<div class="mcard"><div class="ml">Def rating</div><div class="mv">’+t.defR+’</div><div class=“ms” style=“color:’+(t.defR<112?”#9E2B25”:”#6b7280”)+’”>Lower is better</div></div>’+
‘<div class="mcard"><div class="ml">R1 win prob</div><div class="mv">’+t.sp+’%</div><div class="ms">Win series</div></div>’+
‘</div>’+
‘<div class="expand-label">Playoff history</div><div class="hyrs">’+hiH+’</div>’+
‘<div class="pnote">’+t.pn+’</div>’+
‘<div class="expand-label">Injury report</div><div class="inj-list">’+ijH+’</div>’+
‘</div>’;
}
return ‘<div class=“card’+(isExp?” open”:””)+’" onclick="toggleTeam('’+t.abbr+’')”>’+
‘<div class="card-head">’+
‘<span class="t-rank">’+t.confRank+’</span>’+
‘<div class="t-info">’+
‘<div class="t-title">’+t.name+’ <span class="sseed '+si.c+'">’+si.l+’</span></div>’+
‘<div class="t-sub">’+t.wins+’-’+t.losses+’ - Vegas O/U ‘+t.preW+‘W - Projected #’+t.projR+’</div>’+
‘</div>’+
‘<div class="score-block">’+
‘<div class="score-num" style="color:'+pc+'">’+t.ps+’</div>’+
‘<div class="score-label">’+t.ptag+’</div>’+
‘</div>’+
‘</div>’+xH+’</div>’;
}).join(””);
}
function toggleTeam(a){expandedTeam=(expandedTeam===a)?null:a;renderTeams();}
function renderBracket(){
var confNames={W:“Western Conference”,E:“Eastern Conference”};
var champHtml=’<div class="section-hed">Championship odds</div><div class="champ-grid">’;
Object.keys(CHAMP_ODDS).forEach(function(t){
var co=CHAMP_ODDS[t];
champHtml+=’<div class="champ-card"><span class="champ-team">’+t+’</span><span class="champ-odds">’+co.odds+’</span><div class="champ-bar-bg"><div class="champ-bar" style="width:'+co.prob+'%;background:#9E2B25"></div></div></div>’;
});
champHtml+=’</div>’;
var mvpHtml=’<div class="section-hed">Playoff MVP favorites</div>’;
mvpHtml+=MVP_CONTENDERS.map(function(m){
return ‘<div class="mvp-row"><div class="mvp-left"><span class="mvp-name">’+m.name+’</span><span class="mvp-team">’+m.team+’</span></div><div class="mvp-right"><span class="mvp-odds">’+m.odds+’</span><span class="mvp-note">’+m.note+’</span></div></div>’;
}).join(””);
var seriesHtml=Object.keys(BRACKET).map(function(conf){
var series=BRACKET[conf];
return ‘<div class="section-hed">’+confNames[conf]+’ - First Round</div>’+
series.map(function(s){
var isExp=(expandedSeries===(conf+s.s1));
var xH=””;
if(isExp){
var keysHtml=s.keys.map(function(k){
return ‘<div class="series-key"><span class="key-dot"></span>’+k+’</div>’;
}).join(””);
xH=’<div class="series-body">’+
‘<div class="expand-label">Keys to the series</div>’+
‘<div class="series-keys">’+keysHtml+’</div>’+
‘<div class="expand-label">Edge</div>’+
‘<div class="series-edge">’+s.edge+’</div>’+
‘<div class="expand-label">Projection</div>’+
‘<div class="series-proj">’+s.proj+’</div>’+
‘</div>’;
}
return ‘<div class=“series-card’+(isExp?” open”:””)+’" onclick="toggleSeries('’+conf+s.s1+’')”>’+
‘<div class="series-head">’+
‘<div class="series-teams">’+
‘<div class="series-team fav">’+
‘<span class="series-seed">’+s.s1+’</span>’+
‘<span class="series-name">’+s.t1full+’</span>’+
‘<span class="series-prob" style="color:#9E2B25">’+s.p1+’%</span>’+
(s.odds1?’<span class="series-odds">’+s.odds1+’</span>’:’’)+
‘</div>’+
‘<div class="series-team dog">’+
‘<span class="series-seed">’+s.s2+’</span>’+
‘<span class="series-name">’+s.t2full+’</span>’+
‘<span class="series-prob" style="color:#6b7280">’+s.p2+’%</span>’+
(s.odds2?’<span class="series-odds">’+s.odds2+’</span>’:’’)+
‘</div>’+
‘</div>’+
‘<div class="series-bar-wrap">’+
‘<div class="series-bar-bg">’+
‘<div class="series-bar-fill" style="width:'+s.p1+'%;background:#9E2B25"></div>’+
‘</div>’+
‘</div>’+
‘</div>’+
xH+’</div>’;
}).join(””);
}).join(””);
document.getElementById(“brc”).innerHTML=champHtml+mvpHtml+seriesHtml;
}
function toggleSeries(id){
expandedSeries=(expandedSeries===id)?null:id;
renderBracket();
}
function showPage(p,el){
pageTab=p;
document.querySelectorAll(”.ntab”).forEach(function(t){t.classList.remove(“on”);});
el.classList.add(“on”);
document.getElementById(“pg-games”).style.display=p===“games”?“block”:“none”;
document.getElementById(“pg-teams”).style.display=p===“teams”?“block”:“none”;
document.getElementById(“pg-bracket”).style.display=p===“bracket”?“block”:“none”;
if(p===“teams”){renderTeams();}
if(p===“bracket”){renderBracket();}
}
function showGameTab(t,el){
gameTab=t;expandedGame=null;
document.querySelectorAll(”#pg-games .stab”).forEach(function(x){x.classList.remove(“on”);});
el.classList.add(“on”);renderGames();
}
function showConfTab(c,el){
confTab=c;expandedTeam=null;
document.querySelectorAll(”#pg-teams .stab”).forEach(function(x){x.classList.remove(“on”);});
el.classList.add(“on”);renderTeams();
}
var cd=30;
setInterval(function(){
updateTs();cd–;
if(cd<=0){cd=30;fetchAndRender();}
},1000);
fetchAndRender();

</script>
</body>
</html>
