<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Watchability Index</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);
  --r:10px;--rsm:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1917;--bg2:#292524;--bg3:#1c1917;
  --text:#fafaf9;--text2:#a8a29e;--text3:#57534e;
  --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.app{max-width:780px;margin:0 auto;padding:0 16px 60px;}
/* header */
.hdr{padding:24px 0 16px;border-bottom:.5px solid var(--border);margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
.hdr h1{font-size:20px;font-weight:600;}
.hdr p{font-size:13px;color:var(--text2);margin-top:2px;}
.hdr-r{text-align:right;}
#upd{font-size:12px;color:var(--text3);}
.rbtn{font-size:12px;padding:4px 10px;background:transparent;border:.5px solid var(--border2);border-radius:var(--rsm);color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block;}
.rbtn:disabled{opacity:.5;cursor:default;}
/* dot */
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;margin-right:5px;animation:blink 1.4s infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
/* banner */
.banner{font-size:13px;padding:10px 14px;border-radius:var(--rsm);margin-bottom:14px;display:none;}
.banner.loading{background:#dbeafe;color:#1d4ed8;display:block;}
.banner.error{background:#fee2e2;color:#991b1b;display:block;}
.banner.empty{background:var(--bg2);color:var(--text2);display:block;}
/* nav */
.nav{display:flex;border-bottom:.5px solid var(--border);margin-bottom:16px;}
.ntab{font-size:14px;padding:8px 18px;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;margin-bottom:-.5px;background:none;}
.ntab.on{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
/* sub tabs */
.stabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stab{font-size:12px;padding:4px 14px;border:.5px solid var(--border2);border-radius:99px;cursor:pointer;color:var(--text2);background:transparent;}
.stab.on{background:var(--text);color:var(--bg);border-color:var(--text);}
/* card */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:14px 18px;cursor:pointer;margin-bottom:10px;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card.open{border-color:var(--border2);}
.cardhead{display:flex;align-items:center;gap:8px;}
/* pills */
.spill{font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block;background:var(--bg2);color:var(--text3);}
.spill-live{background:#fee2e2;color:#991b1b;}
.spill-red{background:#fee2e2;color:#991b1b;}
.spill-yellow{background:#fef3c7;color:#92400e;}
.bcst{font-size:10px;color:var(--text3);margin-left:4px;}
/* matchup */
.mu{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.tb{display:flex;flex-direction:column;align-items:center;min-width:50px;}
.ta{font-size:13px;font-weight:500;}
.tscore{font-size:22px;font-weight:600;line-height:1.15;}
.tscore.hi{color:var(--text);}
.tscore.lo{color:var(--text2);}
.sep{font-size:11px;color:var(--text3);padding:0 3px;padding-top:10px;}
/* watchability block */
.wsblock{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:88px;}
.wslabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.wsnum{font-size:28px;font-weight:600;line-height:1;}
.wsnum.wg{color:#16a34a;}
.wsnum.wy{color:#d97706;}
.wsnum.wr{color:#dc2626;}
.wbadge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;}
.wbadge.bg{background:#dcfce7;color:#166534;}
.wbadge.by{background:#fef3c7;color:#92400e;}
/* expand body */
.xbody{margin-top:14px;padding-top:14px;border-top:.5px solid var(--border);}
.anote{font-size:11px;color:var(--text2);padding:7px 10px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:12px;line-height:1.6;}
.section-lbl{font-size:12px;font-weight:500;color:var(--text2);margin:12px 0 7px;}
/* standings strip */
.sstrip{display:flex;gap:8px;margin-bottom:14px;}
.scard{flex:1;background:var(--bg2);border-radius:var(--rsm);padding:8px 10px;}
.sname{font-size:12px;font-weight:500;display:block;}
.sname small{font-weight:400;font-size:11px;color:var(--text2);}
.srec{font-size:11px;color:var(--text2);display:block;margin-top:1px;}
.sseed{font-size:10px;font-weight:500;padding:2px 6px;border-radius:99px;display:inline-block;margin-top:4px;}
.seed-green{background:#dcfce7;color:#166534;}
.seed-blue{background:#dbeafe;color:#1d4ed8;}
.seed-yellow{background:#fef3c7;color:#92400e;}
.seed-red{background:#fee2e2;color:#991b1b;}
/* factors */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.factor{background:var(--bg2);border-radius:var(--rsm);padding:9px 11px;}
.factor-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.fname{font-size:11px;color:var(--text2);}
.fwt{font-size:10px;color:var(--text3);}
.fbar-bg{height:4px;background:var(--border);border-radius:99px;margin-bottom:4px;overflow:hidden;}
.fbar{height:4px;border-radius:99px;}
.fval{font-size:13px;font-weight:500;color:var(--text);}
.fval small{font-size:10px;color:var(--text3);font-weight:400;}
/* quarters */
.qtable{display:flex;margin-bottom:14px;border:.5px solid var(--border);border-radius:var(--rsm);overflow:hidden;}
.qcol{flex:1;text-align:center;border-right:.5px solid var(--border);}
.qcol:last-child{border-right:none;}
.qhdr{font-size:10px;color:var(--text3);padding:4px 0;background:var(--bg2);border-bottom:.5px solid var(--border);}
.qaway{font-size:12px;font-weight:500;padding:4px 0;color:var(--text2);}
.qhome{font-size:12px;font-weight:500;padding:4px 0;color:var(--text);border-top:.5px solid var(--border);}
.bold{font-weight:700;}
/* box score */
.boxrow{display:flex;gap:12px;margin-bottom:10px;}
.boxcol{flex:1;min-width:0;}
.boxlbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.boxhdr{display:flex;align-items:center;padding:0 0 3px;border-bottom:.5px solid var(--border);margin-bottom:2px;}
.prow{display:flex;align-items:center;padding:4px 0;border-bottom:.5px solid var(--border);}
.prow:last-child{border-bottom:none;}
.pnm{font-size:12px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pst{font-size:11px;color:var(--text2);text-align:right;width:28px;flex-shrink:0;}
.pst.bold{font-weight:600;color:var(--text);}
.loading-txt{font-size:12px;color:var(--text3);padding:8px 0;font-style:italic;}
/* chart */
.chartsec{margin-bottom:14px;}
.chartlbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.chartleg{display:flex;gap:12px;margin-bottom:6px;}
.chartleg span{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;}
.cline{width:12px;height:2px;display:inline-block;}
.chartwrap{position:relative;width:100%;height:130px;}
/* verdict */
.verdict{padding:10px 13px;border-radius:var(--rsm);font-size:13px;font-weight:500;margin-top:10px;}
/* pregame */
.starbox{background:var(--bg2);border-radius:var(--rsm);padding:8px 10px;margin-bottom:12px;}
.starrow{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid var(--border);}
.starrow:last-child{border-bottom:none;}
.stm{font-size:11px;color:var(--text3);width:30px;}
.snm{font-size:12px;color:var(--text);flex:1;}
.sav{font-size:11px;color:var(--text2);}
.wprow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wptm{font-size:12px;font-weight:500;width:36px;}
.wpbg{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.wpfill{height:8px;border-radius:99px;}
.wppct{font-size:12px;font-weight:500;width:36px;text-align:right;}
/* team page */
.lgd{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.lgdi{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.lgdd{width:8px;height:8px;border-radius:50%;}
.trankn{font-size:13px;font-weight:500;color:var(--text3);width:20px;flex-shrink:0;}
.tinfo{flex:1;min-width:0;}
.ttitle{font-size:14px;font-weight:500;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.tsub{font-size:11px;color:var(--text2);margin-top:2px;}
.tbars{margin-bottom:12px;}
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.tbn{font-size:12px;color:var(--text2);width:160px;flex-shrink:0;}
.tbbg{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.tbf{height:6px;border-radius:99px;}
.tbv{font-size:11px;font-weight:500;width:140px;text-align:right;}
.m3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.mcard{background:var(--bg2);border-radius:var(--rsm);padding:8px 10px;}
.ml{font-size:11px;color:var(--text2);margin-bottom:2px;}
.mv{font-size:15px;font-weight:600;}
.ms{font-size:11px;margin-top:1px;}
.hyrs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.hyr{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hybg{width:22px;height:56px;background:var(--bg2);border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.hybf{width:100%;}
.hyrl{font-size:9px;color:var(--text3);}
.hyrr{font-size:9px;font-weight:500;color:var(--text2);max-width:42px;text-align:center;line-height:1.2;}
.pnote{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--bg2);border-radius:var(--rsm);margin-bottom:10px;line-height:1.5;}
.injlist{display:flex;flex-direction:column;gap:5px;}
.injrow{display:flex;align-items:center;gap:8px;font-size:12px;}
.injdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.doto{background:#dc2626;}
.dotq{background:#f59e0b;}
.dotk{background:#16a34a;}
.injn{font-weight:500;}
.injz{color:var(--text2);}
/* bracket */
.bi{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.5;}
.conflbl{font-size:13px;font-weight:500;margin:18px 0 10px;padding-bottom:6px;border-bottom:.5px solid var(--border);}
.conflbl:first-child{margin-top:0;}
.brgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:520px){.brgrid{grid-template-columns:1fr;}}
.brseries{background:var(--bg2);border-radius:var(--rsm);padding:9px 11px;border:.5px solid var(--border);}
.brteam{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.brteam+.brteam{border-top:.5px solid var(--border);}
.brleft{display:flex;align-items:center;gap:5px;}
.brseed{font-size:11px;color:var(--text3);}
.brnm{font-size:12px;font-weight:500;}
.brnm.fav{color:var(--text);}
.brnm.dog{color:var(--text2);}
.brpct{font-size:12px;font-weight:600;}
.brnote{font-size:10px;color:var(--text3);margin-top:5px;font-style:italic;}
</style>
</head>

};

var liveGames=[],lastFetched=null,isFetching=false;
var charts={},expandedGame=null,gameTab="live";
var expandedTeam=null,confTab="W",pageTab="games";

function barColor(v){return v>=70?"#16a34a":v>=50?"#2563eb":v>=35?"#f59e0b":"#dc2626";}
function wsClass(v){return v>=70?"wg":v>=45?"wy":"wr";}
function wsBadge(v){return v>=70?"bg":"by";}  // will map to CSS classes
function wsBadgeTxt(v){return v>=70?"Hot":v>=45?"Ok":"Skip";}
function pgBadgeTxt(v){return v>=70?"Must watch":v>=55?"Worth it":v>=40?"Average":"Skip";}
function verdictStyle(s){
  if(s>=65){return "background:#dcfce7;color:#166534";}
  if(s>=50){return "background:#fef3c7;color:#92400e";}
  return "background:#fee2e2;color:#991b1b";
}
function verdictTxt(s){
  if(s>=80){return "Must watch right now";}
  if(s>=65){return "Worth turning on";}
  if(s>=50){return "Decent if interested";}
  if(s>=35){return "Skip unless your team";}
  return "Hard pass";
}
function pgVerdictTxt(s){
  if(s>=75){return "Circle this one - top game tonight";}
  if(s>=60){return "Should be a good one";}
  if(s>=45){return "Watchable if nothing else is on";}
  return "Low priority tonight";
}
function seedLabel(rank){
  if(rank<=2){return {l:"#"+rank+" Locked",c:"seed-green"};}
  if(rank<=6){return {l:"#"+rank+" seed",c:"seed-blue"};}
  if(rank<=10){return {l:"#"+rank+" Play-in",c:"seed-yellow"};}
  return {l:"Eliminated",c:"seed-red"};
}
function fmtTime(iso){
  if(!iso){return "";}
  try{return new Date(iso).toLocaleTimeString([],{hour:"numeric",minute:"2-digit",timeZoneName:"short"});}
  catch(e){return "";}
}
function elapsedPct(q,cl){
  var m=(cl||"").match(/(\d+):(\d+)/);
  var sl=m?parseInt(m[1])*60+parseInt(m[2]):720;
  return Math.min(((q-1)*12+(720-sl)/60)/48,1);
}

function calcStakes(ha,aa){
  var h=STANDINGS[A2N[ha]];
  var a=STANDINGS[A2N[aa]];
  if(!h||!a){return {score:20,label:"Low stakes",reason:"No data"};}
  var same=h.conf===a.conf;
  var hr=h.confRank,ar=a.confRank;
  var score=20,reasons=[];
  if(same&&hr<=10&&ar<=10){
    var d=Math.abs(hr-ar);
    if(d<=2){score+=50;reasons.push("Direct seed battle");}
    else if(d<=4){score+=35;reasons.push("Seed positioning");}
    else{score+=20;reasons.push("Conference game");}
  }else if(hr<=10&&ar<=10){
    score+=25;reasons.push("Both contenders");
  }
  if([hr,ar].some(function(r){return r===6||r===7;})){score+=20;reasons.push("Playoff cut line");}
  if([hr,ar].some(function(r){return r>=8&&r<=10;})){score+=15;reasons.push("Play-in bubble");}
  score=Math.min(100,Math.round(score*1.3));
  return {
    score:score,
    label:score>=70?"High stakes":score>=45?"Playoff implications":"Low stakes",
    reason:reasons.join(" - ")||"Low stakes"
  };
}

function calcPregame(ha,aa,wp){
  var hs=STARS[ha]||{players:[],ppg:[],rating:65};
  var as2=STARS[aa]||{players:[],ppg:[],rating:65};
  var hst=STANDINGS[A2N[ha]];
  var ast=STANDINGS[A2N[aa]];
  var starScore=Math.round((hs.rating+as2.rating)/2);
  var sk=calcStakes(ha,aa);
  var hN=hst?hst.netRtg:0;
  var aN=ast?ast.netRtg:0;
  var muScore=Math.min(100,Math.max(0,50+((hN+aN)/2)*4));
  var tScore=50;
  if(wp){var hP=wp[ha]||50;tScore=Math.round(Math.max(10,100-Math.abs(hP-50)*2));}
  var tot=Math.round(starScore*0.30+sk.score*0.28+muScore*0.22+tScore*0.20);
  return {tot:Math.min(99,Math.max(1,tot)),sk:sk,starScore:starScore,muScore:Math.round(muScore),tScore:tScore,hs:hs,as2:as2};
}

function calcWatch(g){
  if(g.status==="scheduled"){return null;}
  var gp=elapsedPct(g.quarter||1,g.clock);
  var hs=g.home.score||0;
  var as2=g.away.score||0;
  var tp=hs+as2;
  var af=((g.home.fgPct||0.45)+(g.away.fgPct||0.45))/2;
  var em=af>0.55?1.2:af>0.48?1.05:af>0.40?0.90:0.75;
  var pr=gp<0.05?50:Math.min(100,Math.max(0,50+(tp-220*gp)*3));
  var pace=Math.min(100,Math.round(pr*em));
  var all=(g.leaders?(g.leaders.home||[]).concat(g.leaders.away||[]):[]);
  var ss=0,sc=0;
  all.forEach(function(p){
    var avg=AVGS[p.name]||12;
    var proj=avg*gp;
    var ab=Math.min(100,p.pts/(avg*0.5+0.01)*50);
    var pf=gp<0.05?50:Math.min(100,50+(p.pts-proj)*5);
    ss+=ab*0.4+pf*0.6;sc++;
  });
  var star=sc?Math.round(ss/sc):40;
  var sk=calcStakes(g.home.abbr,g.away.abbr);
  var mg=Math.abs(hs-as2);
  var gw=Math.min(1,gp*3);
  var cl=Math.round(Math.max(0,100-mg*4)*gw+50*(1-gw));
  var mm=(g.clock||"").match(/(\d+):(\d+)/);
  var sl=mm?parseInt(mm[1])*60+parseInt(mm[2]):720;
  var cu=(g.quarter||1)>=4?Math.min(100,40+(720-sl)/7.2):(g.quarter||1)===3&&sl<180?30:8;
  var tot=Math.round(pace*0.26+star*0.24+sk.score*0.22+cl*0.18+Math.round(cu)*0.10);
  return {
    tot:Math.min(99,Math.max(1,tot)),sk:sk,
    factors:{
      pace:{v:pace,w:"26%",l:"Pace and scoring"},
      star:{v:star,w:"24%",l:"Star performances"},
      stakes:{v:sk.score,w:"22%",l:"Playoff stakes"},
      closeness:{v:cl,w:"18%",l:"Game closeness"},
      clutch:{v:Math.round(cu),w:"10%",l:"Clutch factor"}
    }
  };
}

function standStrip(ha,aa,hn,an){
  var pairs=[{abbr:aa,name:an},{abbr:ha,name:hn}];
  return pairs.map(function(t){
    var s=STANDINGS[t.name]||STANDINGS[A2N[t.abbr]];
    if(!s){return '<div class="scard"><span class="sname">'+t.abbr+'</span></div>';}
    var si=seedLabel(s.confRank);
    return '<div class="scard"><span class="sname">'+t.abbr+' <small>'+(s.conf==="E"?"East":"West")+'</small></span><span class="srec">'+s.wins+'-'+s.losses+'</span><span class="sseed '+si.c+'">'+si.l+'</span></div>';
  }).join("");
}

function factorBars(factors){
  return Object.keys(factors).map(function(k){
    var f=factors[k];
    return '<div class="factor"><div class="factor-top"><span class="fname">'+f.l+'</span><span class="fwt">'+f.w+'</span></div><div class="fbar-bg"><div class="fbar" style="width:'+f.v+'%;background:'+barColor(f.v)+'"></div></div><span class="fval">'+f.v+'<small>/100</small></span></div>';
  }).join("");
}

async function doFetch(){
  if(isFetching){return;}
  isFetching=true;
  document.getElementById("rbtn").disabled=true;
  try{
    var res=await fetch("/api/scores");
    if(!res.ok){throw new Error("HTTP "+res.status);}
    var data=await res.json();
    if(!data.success){throw new Error(data.error||"API error");}
    liveGames=data.games||[];
    lastFetched=new Date();
    var lv=liveGames.filter(function(g){return g.status==="inprogress";}).length;
    var up=liveGames.filter(function(g){return g.status==="scheduled";}).length;
    var fn=liveGames.filter(function(g){return g.status==="final";}).length;
    document.getElementById("tlive").textContent="Live ("+lv+")";
    document.getElementById("tupcoming").textContent="Upcoming ("+up+")";
    document.getElementById("tfinal").textContent="Final ("+fn+")";
    hideBanner();
    updateTs();
  }catch(err){
    showBanner("error","Could not load scores: "+err.message);
  }finally{
    isFetching=false;
    document.getElementById("rbtn").disabled=false;
  }
}

async function fetchAndRender(){
  await doFetch();
  if(pageTab==="games"){renderGames();}
}

async function fetchBox(gameId){
  try{
    var res=await fetch("/api/boxscore?gameId="+gameId);
    if(!res.ok){return;}
    var data=await res.json();
    if(!data.success){return;}
    var g=liveGames.find(function(x){return x.id===gameId;});
    if(!g){return;}
    g.leaders={
      home:data.home.players.slice(0,6),
      away:data.away.players.slice(0,6)
    };
    renderGames();
    setTimeout(function(){drawChart("ch-"+gameId,g);},80);
  }catch(err){
    console.error("boxscore error:",err);
  }
}

function updateTs(){
  if(!lastFetched){return;}
  var s=Math.round((Date.now()-lastFetched)/1000);
  document.getElementById("upd").textContent=s<5?"Updated just now":"Updated "+s+"s ago";
}
function showBanner(type,msg){
  var e=document.getElementById("banner");
  e.className="banner "+type;
  e.textContent=msg;
  e.style.display="block";
}
function hideBanner(){
  document.getElementById("banner").style.display="none";
}

function renderGames(){
  var list;
  if(gameTab==="live"){list=liveGames.filter(function(g){return g.status==="inprogress";});}
  else if(gameTab==="upcoming"){list=liveGames.filter(function(g){return g.status==="scheduled";});}
  else{list=liveGames.filter(function(g){return g.status==="final";});}

  if(!list||!list.length){
    if(!lastFetched){showBanner("loading","Fetching live scores...");}
    else{showBanner("empty",gameTab==="live"?"No games in progress. Check Upcoming or Final.":"No "+gameTab+" games right now.");}
    document.getElementById("gc").innerHTML="";
    return;
  }
  hideBanner();
  if(gameTab==="live"){
    list=list.slice().sort(function(a,b){
      var wa=calcWatch(a),wb=calcWatch(b);
      return (wb?wb.tot:0)-(wa?wa.tot:0);
    });
  }
  if(gameTab==="upcoming"){
    list=list.slice().sort(function(a,b){
      return calcPregame(b.home.abbr,b.away.abbr,null).tot - calcPregame(a.home.abbr,a.away.abbr,null).tot;
    });
  }
  document.getElementById("gc").innerHTML=list.map(renderCard).join("");
}

function renderCard(g){

    var pw=calcPregame(g.home.abbr,g.away.abbr,g.winProb||null);
    var skBadge=pw.sk.score>=45?'<span class="spill spill-'+( pw.sk.score>=70?"red":"yellow")+'">'+pw.sk.label+'</span>':"";
    var wBlock='<div class="wsblock"><span class="wslabel">Pregame</span><span class="wsnum '+wsClass(pw.tot)+'">'+pw.tot+'</span><span class="wbadge '+wsBadge(pw.tot)+'">'+pgBadgeTxt(pw.tot)+'</span></div>';
    var xBody="";
    if(isExp){
      var fcH=factorBars({
        star:{v:pw.starScore,w:"30%",l:"Star power"},
        stakes:{v:pw.sk.score,w:"28%",l:"Playoff stakes"},
        matchup:{v:pw.muScore,w:"22%",l:"Matchup quality"},
        tightness:{v:pw.tScore,w:"20%",l:"Win prob tightness"}
      });
      var allS=[];
      (pw.hs.players||[]).forEach(function(p,i){allS.push({n:p,g:(pw.hs.ppg||[])[i]||0,t:g.home.abbr});});

      allS.sort(function(a,b){return b.g-a.g;});
      var starRows=allS.map(function(p){return '<div class="starrow"><span class="stm">'+p.t+'</span><span class="snm">'+p.n+'</span><span class="sav">'+p.g+' ppg</span></div>';}).join("");
      var wpH="";
      if(g.winProb){
        var hP=g.winProb[g.home.abbr]||50;
        var aP=g.winProb[g.away.abbr]||(100-hP);
        wpH='<div class="section-lbl">Vegas win probability</div>'+
            '<div class="wprow"><span class="wptm">'+g.home.abbr+'</span><div class="wpbg"><div class="wpfill" style="width:'+hP+'%;background:#3b82f6"></div></div><span class="wppct">'+hP+'%</span></div>'+
            '<div class="wprow"><span class="wptm">'+g.away.abbr+'</span><div class="wpbg"><div class="wpfill" style="width:'+aP+'%;background:#f97316"></div></div><span class="wppct">'+aP+'%</span></div>';
      }
      xBody='<div class="xbody">'+
        '<div class="anote">Pregame weights: star power 30% - playoff stakes 28% - matchup quality 22% - win prob tightness 20%. Stakes: '+pw.sk.reason+' ('+pw.sk.score+'/100)</div>'+
        '<div class="sstrip">'+standStrip(g.home.abbr,g.away.abbr,g.home.name,g.away.name)+'</div>'+
        '<div class="section-lbl">Score factors</div><div class="fgrid">'+fcH+'</div>'+
        '<div class="section-lbl">Players to watch</div><div class="starbox">'+starRows+'</div>'+
        wpH+
        '<div class="verdict" style="'+verdictStyle(pw.tot)+'">'+pgVerdictTxt(pw.tot)+'</div>'+
        '</div>';
    }
    return '<div class="card'+(isExp?" open":"")+'\" onclick=\"toggleGame(\''+g.id+'\')">'+
      '<div class="cardhead">'+
        '<span class="spill">'+fmtTime(g.startTime)+'</span>'+
        '<div class="mu"><div class="tb"><span class="ta">'+g.away.abbr+'</span></div>'+
        '<span class="sep">@</span>'+
        '<div class="tb"><span class="ta">'+g.home.abbr+'</span></div>'+
        skBadge+'</div>'+wBlock+
      '</div>'+xBody+'</div>';
  }

  // LIVE / FINAL
  var ws=calcWatch(g);
  var gp=elapsedPct(g.quarter||1,g.clock);
  var sk=calcStakes(g.home.abbr,g.away.abbr);
  var skB=sk.score>=45?'<span class="spill spill-'+(sk.score>=70?"red":"yellow")+'">'+sk.label+'</span>':"";
  var bcB=g.broadcasts&&g.broadcasts.length?'<span class="bcst">'+g.broadcasts[0]+'</span>':"";
  var spill=g.status==="inprogress"
    ?'<span class="spill spill-live"><span class="dot"></span>Q'+g.quarter+' '+g.clock+'</span>'
    :'<span class="spill">Final</span>';
  var hl=(g.home.score||0)>(g.away.score||0);
  var hSc=g.home.score!=null?'<span class="tscore '+(hl?"hi":"lo")+'">'+g.home.score+'</span>':"";
  var aSc=g.away.score!=null?'<span class="tscore '+(!hl?"hi":"lo")+'">'+g.away.score+'</span>':"";
  var wBlock=ws
    ?'<div class="wsblock"><span class="wslabel">Watchability</span><span class="wsnum '+wsClass(ws.tot)+'">'+ws.tot+'</span><span class="wbadge '+wsBadge(ws.tot)+'">'+wsBadgeTxt(ws.tot)+'</span></div>'
    :'<div class="wsblock"><span class="wslabel">Final</span></div>';
  var xBody="";
  if(isExp&&ws){
    var qH="";
    if(g.periodScores&&g.periodScores.length){
      var cols=g.periodScores.map(function(p){
        return '<div class="qcol"><div class="qhdr">Q'+p.period+'</div><div class="qaway">'+p.away+'</div><div class="qhome">'+p.home+'</div></div>';
      }).join("");
      qH='<div class="section-lbl">Quarter scores - '+g.away.abbr+' / '+g.home.abbr+'</div>'+
         '<div class="qtable">'+cols+
         '<div class="qcol"><div class="qhdr">TOT</div><div class="qaway bold">'+(g.away.score||0)+'</div><div class="qhome bold">'+(g.home.score||0)+'</div></div>'+
         '</div>';
    }
    var lH="";
    if(g.leaders&&((g.leaders.home&&g.leaders.home.length)||(g.leaders.away&&g.leaders.away.length))){
      var rtp=function(pl,lb){
        if(!pl||!pl.length){return "";}
        var rows=pl.map(function(p){
          var fg=(p.fgm!==undefined&&p.fga!==undefined)?p.fgm+"/"+p.fga:"";
          return '<div class="prow"><span class="pnm">'+p.name+'</span><span class="pst">'+p.reb+'</span><span class="pst">'+p.ast+'</span><span class="pst">'+fg+'</span><span class="pst bold">'+p.pts+'</span></div>';
        }).join("");
        return '<div class="boxcol"><div class="boxlbl">'+lb+'</div>'+
               '<div class="boxhdr"><span class="pnm">Player</span><span class="pst">Reb</span><span class="pst">Ast</span><span class="pst">FG</span><span class="pst">Pts</span></div>'+
               rows+'</div>';
      };
      lH='<div class="section-lbl">Box score</div><div class="boxrow">'+rtp(g.leaders.away,g.away.abbr)+rtp(g.leaders.home,g.home.abbr)+'</div>';
    }else if(g.status==="inprogress"||g.status==="final"){
      lH='<div class="section-lbl">Box score</div><div class="loading-txt">Loading player stats...</div>';
    }
    var cid="ch-"+g.id;
    xBody='<div class="xbody">'+
      '<div class="anote">Weights: pace 26% - stars 24% - playoff stakes 22% - closeness 18% - clutch 10%. Stakes: '+ws.sk.reason+' ('+ws.sk.score+'/100)</div>'+
      '<div class="sstrip">'+standStrip(g.home.abbr,g.away.abbr,g.home.name,g.away.name)+'</div>'+
      qH+
      '<div class="section-lbl">Score factors</div><div class="fgrid">'+factorBars(ws.factors)+'</div>'+
      '<div class="chartsec">'+
        '<div class="chartlbl">Win probability</div>'+
        '<div class="chartleg"><span><span class="cline" style="background:#3b82f6"></span>'+g.home.abbr+'</span>'+
        '<span><span class="cline" style="background:#f97316"></span>'+g.away.abbr+'</span></div>'+
        '<div class="chartwrap"><canvas id="'+cid+'"></canvas></div>'+
      '</div>'+
      lH+
      '<div class="verdict" style="'+verdictStyle(ws.tot)+'">'+verdictTxt(ws.tot)+'</div>'+
      '</div>';
  }
  return '<div class="card'+(isExp?" open":"")+'\" onclick=\"toggleGame(\''+g.id+'\')">'+
    '<div class="cardhead">'+spill+
    '<div class="mu"><div class="tb"><span class="ta">'+g.away.abbr+'</span>'+aSc+'</div>'+
    '<span class="sep">@</span>'+
    '<div class="tb"><span class="ta">'+g.home.abbr+'</span>'+hSc+'</div>'+
    skB+bcB+'</div>'+wBlock+'</div>'+xBody+'</div>';
}

function toggleGame(id){
  expandedGame=(expandedGame===id)?null:id;
  renderGames();
  if(expandedGame){
    var g=liveGames.find(function(x){return x.id===id;});
    if(g&&(g.status==="inprogress"||g.status==="final")){
      setTimeout(function(){drawChart("ch-"+id,g);},80);
      fetchBox(id);
    }
  }
}

function drawChart(cid,g){
  var ex=charts[cid];
  if(ex){ex.destroy();delete charts[cid];}
  var cv=document.getElementById(cid);
  if(!cv){return;}
  var gp=elapsedPct(g.quarter||1,g.clock);
  var mg=(g.home.score||0)-(g.away.score||0);
  var ch=Math.min(95,Math.max(5,50+mg*3*(gp>0.1?1:0.3)));
  var hd=[50,Math.round(50+mg*1.5*(gp/2)),Math.round(ch)];
  var ad=hd.map(function(v){return 100-v;});
  var dk=window.matchMedia("(prefers-color-scheme:dark)").matches;
  var gc=dk?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.05)";
  var tc=dk?"#78716c":"#a8a29e";
  charts[cid]=new Chart(cv,{
    type:"line",
    data:{
      labels:["Start","Mid","Now"],
      datasets:[
        {label:g.home.abbr,data:hd,borderColor:"#3b82f6",borderWidth:2,pointRadius:3,pointBackgroundColor:"#3b82f6",tension:0.4,fill:false},
        {label:g.away.abbr,data:ad,borderColor:"#f97316",borderWidth:2,pointRadius:3,pointBackgroundColor:"#f97316",tension:0.4,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:tc}},
        y:{min:0,max:100,grid:{color:gc},ticks:{font:{size:10},color:tc,callback:function(v){return v+"%";},stepSize:25}}
      }
    }
  });
}

function renderTeams(){
  var list=TEAMS[confTab];
  document.getElementById("tc").innerHTML=list.map(function(t){
    var isExp=(expandedTeam===t.abbr);
    var si=seedLabel(t.confRank);
    var wd=t.wins-t.preW;
    var rd=t.projR-t.confRank;
    var nr=(t.offR-t.defR).toFixed(1);
    var pc=t.ps>=80?"#16a34a":t.ps>=60?"#2563eb":t.ps>=40?"#d97706":"#dc2626";
    var pb=t.ps>=80?"bg":"by";
    var xH="";
    if(isExp){
      var bars=[
        {n:"Wins vs Vegas O/U",v:Math.min(100,Math.max(0,50+wd*4)),tx:(wd>=0?"+":"")+wd+"W "+(wd>=0?"above":"below")+" Vegas",c:wd>=0?"#16a34a":"#dc2626"},
        {n:"Conf rank vs projection",v:Math.min(100,Math.max(0,50+rd*8)),tx:rd>0?"#"+t.confRank+" - "+rd+" spots better":rd===0?"On projection":"#"+t.confRank+" - "+Math.abs(rd)+" worse",c:rd>=0?"#16a34a":"#dc2626"},
        {n:"Net rating",v:Math.min(100,Math.max(0,50+parseFloat(nr)*4)),tx:(parseFloat(nr)>=0?"+":"")+nr+" net rtg",c:parseFloat(nr)>=3?"#16a34a":parseFloat(nr)>=0?"#2563eb":"#dc2626"}
      ];
      var bH=bars.map(function(b){
        return '<div class="tbar"><span class="tbn">'+b.n+'</span><div class="tbbg"><div class="tbf" style="width:'+b.v+'%;background:'+b.c+'"></div></div><span class="tbv" style="color:'+b.c+'">'+b.tx+'</span></div>';
      }).join("");
      var hiH=t.pr.map(function(r){
        var bg=r.h>=90?"#16a34a":r.h>=60?"#2563eb":r.h>=25?"#f59e0b":"#d1d5db";
        return '<div class="hyr"><div class="hybg"><div class="hybf" style="height:'+r.h+'%;background:'+bg+'"></div></div><div class="hyrl">'+r.yr+'</div><div class="hyrr">'+r.l+'</div></div>';
      }).join("");
      var ijH=t.inj.map(function(i){
        return '<div class="injrow"><div class="injdot '+i.dc+'"></div><span class="injn">'+i.n+'</span><span class="injz">'+i.s+(i.note?" - "+i.note:"")+'</span></div>';
      }).join("");
      xH='<div class="xbody">'+
        '<div class="section-lbl">Performance vs expectation</div><div class="tbars">'+bH+'</div>'+
        '<div class="m3">'+
          '<div class="mcard"><div class="ml">Off rating</div><div class="mv">'+t.offR+'</div><div class="ms" style="color:'+(t.offR>115?"#16a34a":"#f59e0b")+'">Lg avg 115.2</div></div>'+
          '<div class="mcard"><div class="ml">Def rating</div><div class="mv">'+t.defR+'</div><div class="ms" style="color:'+(t.defR<112?"#16a34a":"#dc2626")+'">Lower is better</div></div>'+
          '<div class="mcard"><div class="ml">R1 win prob</div><div class="mv">'+t.sp+'%</div><div class="ms">Win R1 series</div></div>'+
        '</div>'+
        '<div class="section-lbl">Playoff history</div><div class="hyrs">'+hiH+'</div>'+
        '<div class="pnote">'+t.pn+'</div>'+
        '<div class="section-lbl">Injuries</div><div class="injlist">'+ijH+'</div>'+
        '</div>';
    }
    return '<div class="card'+(isExp?" open":"")+'\" onclick=\"toggleTeam(\''+t.abbr+'\')">'+
      '<div class="cardhead">'+
        '<span class="trankn">'+t.confRank+'</span>'+
        '<div class="tinfo">'+
          '<div class="ttitle">'+t.name+' <span class="sseed '+si.c+'">'+si.l+'</span></div>'+
          '<div class="tsub">'+t.wins+'-'+t.losses+' - Vegas O/U '+t.preW+'W - Projected #'+t.projR+'</div>'+
        '</div>'+
        '<div class="wsblock">'+
          '<span class="wslabel">Perf score</span>'+
          '<span class="wsnum" style="color:'+pc+'">'+t.ps+'</span>'+
          '<span class="wbadge '+pb+'">'+t.ptag+'</span>'+
        '</div>'+
      '</div>'+xH+'</div>';
  }).join("");
}

function toggleTeam(a){expandedTeam=(expandedTeam===a)?null:a;renderTeams();}

function renderBracket(){
  var nm={W:"Western Conference",E:"Eastern Conference"};
  document.getElementById("brc").innerHTML=Object.keys(BRACKET).map(function(conf){
    return '<div class="conflbl">'+nm[conf]+' - First Round</div><div class="brgrid">'+
      BRACKET[conf].map(function(s){
        return '<div class="brseries">'+
          '<div class="brteam"><div class="brleft"><span class="brseed">'+s.s1+'</span><span class="brnm fav">'+s.t1+'</span></div><span class="brpct" style="color:#16a34a">'+s.p1+'%</span></div>'+
          '<div class="brteam"><div class="brleft"><span class="brseed">'+s.s2+'</span><span class="brnm dog">'+s.t2+'</span></div><span class="brpct" style="color:#dc2626">'+s.p2+'%</span></div>'+
          '<div class="brnote">'+s.note+'</div></div>';
      }).join("")+'</div>';
  }).join("");
}

function showPage(p,el){
  pageTab=p;
  document.querySelectorAll(".ntab").forEach(function(t){t.classList.remove("on");});
  el.classList.add("on");
  document.getElementById("pg-games").style.display=p==="games"?"block":"none";
  document.getElementById("pg-teams").style.display=p==="teams"?"block":"none";
  document.getElementById("pg-bracket").style.display=p==="bracket"?"block":"none";
  if(p==="teams"){renderTeams();}
  if(p==="bracket"){renderBracket();}
}

function showGameTab(t,el){
  gameTab=t;expandedGame=null;
  document.querySelectorAll("#pg-games .stab").forEach(function(x){x.classList.remove("on");});
  el.classList.add("on");renderGames();
}

function showConfTab(c,el){
  confTab=c;expandedTeam=null;
  document.querySelectorAll("#pg-teams .stab").forEach(function(x){x.classList.remove("on");});
  el.classList.add("on");renderTeams();
}

setInterval(function(){
  updateTs();cd--;
  if(cd<=0){cd=30;fetchAndRender();}
},1000);
