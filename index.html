:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;

  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --radius:10px;--rsm:6px;
  --green-bg:#dcfce7;--green-text:#166534;
  --yellow-bg:#fef3c7;--yellow-text:#92400e;
  --red-bg:#fee2e2;--red-text:#991b1b;
  --blue-bg:#dbeafe;--blue-text:#1d4ed8;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1917;--bg2:#292524;--bg3:#1c1917;
  --text:#fafaf9;--text2:#a8a29e;--text3:#57534e;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --green-bg:#14532d;--green-text:#86efac;
  --yellow-bg:#451a03;--yellow-text:#fcd34d;
  --red-bg:#450a0a;--red-text:#fca5a5;
  --blue-bg:#1e3a5f;--blue-text:#93c5fd;

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.app{max-width:780px;margin:0 auto;padding:0 16px 60px;}
.hdr{padding:24px 0 16px;border-bottom:0.5px solid var(--border);margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
.hdr h1{font-size:20px;font-weight:600;}
.hdr p{font-size:13px;color:var(--text2);margin-top:2px;}
.hdr-r{text-align:right;}
#upd{font-size:12px;color:var(--text3);}
.rbtn{font-size:12px;padding:4px 10px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--rsm);color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block;}
.rbtn:disabled{opacity:0.5;cursor:default;}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;margin-right:5px;animation:blink 1.4s infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.banner{font-size:13px;padding:10px 14px;border-radius:var(--rsm);margin-bottom:14px;display:none;}
.banner.loading{background:var(--blue-bg);color:var(--blue-text);display:block;}
.banner.error{background:var(--red-bg);color:var(--red-text);display:block;}
.banner.empty{background:var(--bg2);color:var(--text2);display:block;}
.nav{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:16px;}
.ntab{font-size:14px;padding:8px 18px;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;margin-bottom:-0.5px;background:none;}
.ntab.on{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
.stabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stab{font-size:12px;padding:4px 14px;border:0.5px solid var(--border2);border-radius:99px;cursor:pointer;color:var(--text2);background:transparent;}
.stab.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;margin-bottom:10px;transition:border-color 0.15s;}
.card:hover{border-color:var(--border2);}
.card.open{border-color:var(--border2);}
.ch{display:flex;align-items:center;gap:8px;}
.pill{font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px;white-space:nowrap;display:inline-block;}
.pg{background:var(--green-bg);color:var(--green-text);}
.pb{background:var(--blue-bg);color:var(--blue-text);}
.py{background:var(--yellow-bg);color:var(--yellow-text);}

.tb{display:flex;flex-direction:column;align-items:center;min-width:50px;}

function sc2(rank){
if(rank<=2)return{l:”#”+rank+” Locked”,c:“pg”};
if(rank<=6)return{l:”#”+rank+” seed”,c:“pb”};
if(rank<=10)return{l:”#”+rank+” Play-in”,c:“py”};
return{l:“Eliminated”,c:“pr”};
}
function ft(iso){
if(!iso)return””;
try{return new Date(iso).toLocaleTimeString([],{hour:“numeric”,minute:“2-digit”,timeZoneName:“short”});}
catch(e){return””;}
}
function ep(q,cl){
var m=(cl||””).match(/(\d+):(\d+)/);
var sl=m?parseInt(m[1])*60+parseInt(m[2]):720;
return Math.min(((q-1)*12+(720-sl)/60)/48,1);
}

function stakes(ha,aa){
var h=STANDINGS[A2N[ha]],a=STANDINGS[A2N[aa]];
if(!h||!a)return{s:20,l:“Low stakes”,c:“p0”,r:“No data”};
var sc=h.conf===a.conf,hr=h.confRank,ar=a.confRank;
var score=20,reasons=[];
if(sc&&hr<=10&&ar<=10){
var d=Math.abs(hr-ar);
if(d<=2){score+=50;reasons.push(“Direct seed battle”);}
else if(d<=4){score+=35;reasons.push(“Seed positioning”);}
else{score+=20;reasons.push(“Conference game”);}
}else if(hr<=10&&ar<=10){score+=25;reasons.push(“Both contenders”);}
if([hr,ar].some(function(r){return r===6||r===7;})){score+=20;reasons.push(“Playoff cut line”);}
if([hr,ar].some(function(r){return r>=8&&r<=10;})){score+=15;reasons.push(“Play-in bubble”);}
score=Math.min(100,Math.round(score*1.3));
return{s:score,l:score>=70?“High stakes”:score>=45?“Playoff implications”:“Low stakes”,c:score>=70?“pr”:score>=45?“py”:“p0”,r:reasons.join(” - “)||“Low stakes”};
}

function pregame(ha,aa,wp2){
var hs=STARS[ha]||{p:[],g:[],r:65};
var as2=STARS[aa]||{p:[],g:[],r:65};
var hst=STANDINGS[A2N[ha]],ast=STANDINGS[A2N[aa]];
var starS=Math.round((hs.r+as2.r)/2);
var sk=stakes(ha,aa);
var hN=hst?hst.netRtg:0,aN=ast?ast.netRtg:0;
var muS=Math.min(100,Math.max(0,50+((hN+aN)/2)*4));
var tS=50;
if(wp2){var hP=wp2[ha]||50;tS=Math.round(Math.max(10,100-Math.abs(hP-50)*2));}
var tot=Math.round(starS*0.30+sk.s*0.28+muS*0.22+tS*0.20);
return{tot:Math.min(99,Math.max(1,tot)),sk:sk,starS:starS,muS:Math.round(muS),tS:tS,hs:hs,as2:as2};
}

function watch(g){
if(g.status===“scheduled”)return null;
var gp=ep(g.quarter||1,g.clock);
var hs=g.home.score||0,as2=g.away.score||0,tp=hs+as2;
var af=((g.home.fgPct||0.45)+(g.away.fgPct||0.45))/2;
var em=af>0.55?1.2:af>0.48?1.05:af>0.40?0.90:0.75;
var pr=gp<0.05?50:Math.min(100,Math.max(0,50+(tp-220*gp)*3));
var pace=Math.min(100,Math.round(pr*em));
var all=(g.leaders?(g.leaders.home||[]).concat(g.leaders.away||[]):[]);
var ss=0,sc3=0;
all.forEach(function(p){
var avg=AVGS[p.name]||12;
var proj=avg*gp;
var ab=Math.min(100,p.pts/(avg*0.5+0.01)*50);
var pf=gp<0.05?50:Math.min(100,50+(p.pts-proj)*5);
ss+=ab*0.4+pf*0.6;sc3++;
});
var star=sc3?Math.round(ss/sc3):40;
var sk=stakes(g.home.abbr,g.away.abbr);
var mg=Math.abs(hs-as2),gw=Math.min(1,gp*3);
var cl=Math.round(Math.max(0,100-mg*4)*gw+50*(1-gw));
var mm=(g.clock||””).match(/(\d+):(\d+)/);
var sl=mm?parseInt(mm[1])*60+parseInt(mm[2]):720;
var cu=(g.quarter||1)>=4?Math.min(100,40+(720-sl)/7.2):(g.quarter||1)===3&&sl<180?30:8;
var tot=Math.round(pace*0.26+star*0.24+sk.s*0.22+cl*0.18+Math.round(cu)*0.10);
return{
tot:Math.min(99,Math.max(1,tot)),sk:sk,
f:{
pace:{v:pace,w:“26%”,l:“Pace and scoring”},
star:{v:star,w:“24%”,l:“Star performances”},
stakes:{v:sk.s,w:“22%”,l:“Playoff stakes”},
close:{v:cl,w:“18%”,l:“Game closeness”},
clutch:{v:Math.round(cu),w:“10%”,l:“Clutch factor”}
}
};
}

function sbHtml(ha,aa,hn,an){
return [{abbr:aa,name:an},{abbr:ha,name:hn}].map(function(t){
var st=STANDINGS[t.name]||STANDINGS[A2N[t.abbr]];
if(!st)return “<div class="sc"><div class="sn">”+t.abbr+”</div></div>”;
var si=sc2(st.confRank);
return “<div class="sc"><div class="sn">”+t.abbr+” <span style="font-weight:400;font-size:11px;color:var(–text2);">”+(st.conf===“E”?“East”:“West”)+”</span></div><div class="sr">”+st.wins+”-”+st.losses+”</div><span class="sd “+si.c+”">”+si.l+”</span></div>”;
}).join(””);
}

function fbHtml(f){
return Object.keys(f).map(function(k){
var x=f[k];
return “<div class="fc"><div class="ft"><span class="fn">”+x.l+”</span><span class="fw">”+x.w+”</span></div><div class="fb"><div class="ff" style="width:”+x.v+”%;background:”+bc(x.v)+”;"></div></div><div class="fv">”+x.v+”<span>/100</span></div></div>”;

}

async function fetchScores(){
if(isFetching)return;
isFetching=true;
document.getElementById(“rbtn”).disabled=true;
try{
var res=await fetch(”/api/scores”);
var data=await res.json();
if(!data.success)throw new Error(data.error||“API error”);
liveGames=data.games||[];
lastFetched=new Date();
var lv=liveGames.filter(function(g){return g.status===“inprogress”;}).length;
var up=liveGames.filter(function(g){return g.status===“scheduled”;}).length;
var fn=liveGames.filter(function(g){return g.status===“final”;}).length;
document.getElementById(“tl”).textContent=“Live (”+lv+”)”;
document.getElementById(“tu”).textContent=“Upcoming (”+up+”)”;
document.getElementById(“tf”).textContent=“Final (”+fn+”)”;
hideBanner();
updateTs();
}catch(err){showBanner(“error”,“Could not load scores: “+err.message);}

}

}

});
}

});
